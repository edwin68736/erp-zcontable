services:

  mysql:
    image: mysql:8

    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: sistema

    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build:
      context: ./backend

    expose:
      - "8080"

    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: sistema
      DB_USER: root
      DB_PASSWORD: 123456

    depends_on:
      - mysql

    labels:
      - traefik.enable=true

      # API GO
      - traefik.http.routers.backend.rule=Host(`api.zcontables.net`)
      - traefik.http.routers.backend.entrypoints=websecure
      - traefik.http.routers.backend.tls=true
      - traefik.http.services.backend.loadbalancer.server.port=8080

  frontend:
    build:
      context: ./frontend

    expose:
      - "3000"

    depends_on:
      - backend

    labels:
      - traefik.enable=true

      # FRONTEND REACT
      - traefik.http.routers.frontend.rule=Host(`zcontables.net`)
      - traefik.http.routers.frontend.entrypoints=websecure
      - traefik.http.routers.frontend.tls=true
      - traefik.http.services.frontend.loadbalancer.server.port=3000

volumes:
  mysql_data: