name: Deploy VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0

        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22

          script: |
            set -euo pipefail

            cd /docker/erp-zcontable

            git fetch origin main
            git reset --hard origin/main

            echo "=== Deploy $(git rev-parse --short HEAD) — $(git log -1 --oneline) ==="

            export BUILD_COMMIT="$(git rev-parse HEAD)"

            docker compose down

            # Frontend: sin caché de imagen para que dist/ refleje siempre el último código.
            docker compose build --no-cache frontend

            # Backend: rebuild normal (más rápido; capas se invalidan al cambiar código).
            docker compose build backend

            docker compose up -d

            echo "=== Contenedores ==="
            docker compose ps
